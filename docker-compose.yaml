version: '1'
services:
  postgres:
    image: postgres:11-alpine
    restart: always
    ports:
      - '${POSTGRES_PORT_EXT:-5432}:5432'
    env_file:
      - ./.env
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    env_file:
      - ./.env
    volumes:
      - redis_data:/data

volumes:
  redis_data:
